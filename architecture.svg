<svg width="100%" viewBox="0 0 800 670" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>PortfolioIQ Architecture</title>
  <desc>Full system architecture: clients, Django REST API, AI orchestra with three Claude agents, Celery worker, data layer, and external APIs</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .label-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; text-anchor: middle; dominant-baseline: central; }
      .label-sub   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; text-anchor: middle; dominant-baseline: central; }
      .arrow-line  { stroke: rgb(156, 154, 146); stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .arrow-soft  { stroke: rgb(156, 154, 146); stroke-width: 1; fill: none; opacity: 0.5; marker-end: url(#arrow); }
      .arrow-dash  { stroke: rgb(156, 154, 146); stroke-width: 0.9; stroke-dasharray: 4 3; fill: none; opacity: 0.35; marker-end: url(#arrow); }
      .flow-label  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; fill: rgb(194, 192, 182); text-anchor: middle; opacity: 0.6; }
    </style>
  </defs>

  <g>
    <rect x="40" y="20" width="210" height="44" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
    <text x="145" y="38" fill="rgb(206, 203, 246)" class="label-title">Browser</text>
    <text x="145" y="54" fill="rgb(175, 169, 236)" class="label-sub">Next.js · trading dashboard</text>
  </g>

  <g>
    <rect x="295" y="20" width="210" height="44" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
    <text x="400" y="38" fill="rgb(206, 203, 246)" class="label-title">Mobile Web</text>
    <text x="400" y="54" fill="rgb(175, 169, 236)" class="label-sub">Responsive · same app</text>
  </g>

  <g>
    <rect x="550" y="20" width="210" height="44" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
    <text x="655" y="38" fill="rgb(206, 203, 246)" class="label-title">Telegram</text>
    <text x="655" y="54" fill="rgb(175, 169, 236)" class="label-sub">Your phone — /chat /analyze</text>
  </g>

  <path d="M145 64 L350 105" class="arrow-soft"/>
  <path d="M400 64 L400 105" class="arrow-soft"/>
  <path d="M655 64 L450 105" class="arrow-soft"/>

  <g>
    <rect x="180" y="110" width="440" height="44" rx="8" fill="rgb(12, 68, 124)" stroke="rgb(133, 183, 235)" stroke-width="0.5"/>
    <text x="400" y="128" fill="rgb(181, 212, 244)" class="label-title">Django REST API</text>
    <text x="400" y="144" fill="rgb(133, 183, 235)" class="label-sub">Auth · Portfolio · Journal · /ai/* · /ai/telegram/webhook/</text>
  </g>

  <line x1="400" y1="154" x2="400" y2="192" class="arrow-line"/>

  <g>
    <rect x="220" y="192" width="360" height="44" rx="8" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
    <text x="400" y="210" fill="rgb(250, 199, 117)" class="label-title">AI Router</text>
    <text x="400" y="226" fill="rgb(239, 159, 39)" class="label-sub">route() — picks the right agent</text>
  </g>

  <path d="M285 236 L150 284" class="arrow-soft"/>
  <line x1="400" y1="236" x2="400" y2="284" class="arrow-line"/>
  <path d="M515 236 L650 284" class="arrow-soft"/>

  <g>
    <rect x="40" y="284" width="220" height="52" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
    <text x="150" y="302" fill="rgb(159, 225, 203)" class="label-title">Portfolio Analyst</text>
    <text x="150" y="320" fill="rgb(93, 202, 165)" class="label-sub">Risks · P&amp;L · suggestions</text>
  </g>

  <g>
    <rect x="290" y="284" width="220" height="52" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
    <text x="400" y="302" fill="rgb(159, 225, 203)" class="label-title">Journal Writer</text>
    <text x="400" y="320" fill="rgb(93, 202, 165)" class="label-sub">Auto-format trade entries</text>
  </g>

  <g>
    <rect x="540" y="284" width="220" height="52" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
    <text x="650" y="302" fill="rgb(159, 225, 203)" class="label-title">Portfolio Chat</text>
    <text x="650" y="320" fill="rgb(93, 202, 165)" class="label-sub">Freeform Q&amp;A</text>
  </g>

  <path d="M150 336 L320 390" class="arrow-soft"/>
  <line x1="400" y1="336" x2="400" y2="390" class="arrow-line"/>
  <path d="M650 336 L480 390" class="arrow-soft"/>

  <g>
    <rect x="220" y="390" width="360" height="52" rx="8" fill="rgb(113, 43, 19)" stroke="rgb(240, 153, 123)" stroke-width="0.5"/>
    <text x="400" y="408" fill="rgb(245, 196, 179)" class="label-title">Claude API</text>
    <text x="400" y="426" fill="rgb(240, 153, 123)" class="label-sub">claude-sonnet-4-6 · separate prompt per agent</text>
  </g>

  <line x1="400" y1="442" x2="400" y2="478" class="arrow-line"/>

  <g>
    <rect x="180" y="478" width="440" height="52" rx="8" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
    <text x="400" y="496" fill="rgb(250, 199, 117)" class="label-title">Celery Worker</text>
    <text x="400" y="514" fill="rgb(239, 159, 39)" class="label-sub">run_ai_agent · fetch_quotes · check_price_alerts</text>
  </g>

  <path d="M260 530 L160 580" class="arrow-soft"/>
  <path d="M340 530 L340 580" class="arrow-soft"/>
  <path d="M460 530 L460 580" class="arrow-soft"/>
  <path d="M540 530 L660 580" class="arrow-soft"/>

  <text x="200" y="558" class="flow-label">save</text>
  <text x="345" y="558" class="flow-label">index</text>
  <text x="465" y="558" class="flow-label">prices</text>
  <text x="612" y="558" class="flow-label">reply</text>

  <g>
    <rect x="30" y="580" width="200" height="60" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
    <text x="130" y="602" fill="rgb(159, 225, 203)" class="label-title">PostgreSQL + Redis</text>
    <text x="130" y="622" fill="rgb(93, 202, 165)" class="label-sub">Trades · cache · queue</text>
  </g>

  <g>
    <rect x="245" y="580" width="190" height="60" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
    <text x="340" y="602" fill="rgb(159, 225, 203)" class="label-title">Elasticsearch</text>
    <text x="340" y="622" fill="rgb(93, 202, 165)" class="label-sub">Journal search</text>
  </g>

  <g>
    <rect x="450" y="580" width="120" height="60" rx="8" fill="rgb(12, 68, 124)" stroke="rgb(133, 183, 235)" stroke-width="0.5"/>
    <text x="510" y="602" fill="rgb(181, 212, 244)" class="label-title">Market Data</text>
    <text x="510" y="622" fill="rgb(133, 183, 235)" class="label-sub">Massive · yfinance</text>
  </g>

  <g>
    <rect x="585" y="580" width="175" height="60" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
    <text x="672" y="602" fill="rgb(206, 203, 246)" class="label-title">Telegram Bot API</text>
    <text x="672" y="622" fill="rgb(175, 169, 236)" class="label-sub">Push to your phone</text>
  </g>

  <path d="M50 600 Q15 380 145 64" class="arrow-dash"/>
  <text x="18" y="380" class="flow-label" transform="rotate(-90 18 380)">poll result</text>

  <path d="M740 640 Q790 380 660 64" class="arrow-dash"/>
  <text x="780" y="380" class="flow-label" transform="rotate(90 780 380)">notification</text>
</svg>
